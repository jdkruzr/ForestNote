  <!-- Pine+pen mark in a 256-unit design space. Transform places it inside the
       adaptive-icon 66×66 safe zone (viewport range 21-87), centered at (54, 54),
       so round/squircle masks no longer crop the tips. Order matters: translate
       last, applied in viewport coords (matches Android VectorDrawable's group
       transform: scale → translate). -->
