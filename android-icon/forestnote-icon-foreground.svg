    <path fill="#000000" fill-rule="evenodd" d="M128 28 L196 96 L168 96 L210 144 L176 144 L222 196 L142 196 L142 232 L114 232 L114 196 L34 196 L80 144 L46 144 L88 96 L60 96 Z&#xA;         M117 72 L139 72 L139 144 L128 164 L117 144 Z"></path>
  </g>
</svg>